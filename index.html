<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#185fa5">
<title>Portfolio Tracker</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a18;font-size:15px;line-height:1.5;min-height:100vh}
.app{max-width:480px;margin:0 auto;padding-bottom:80px}
.topbar{background:#fff;border-bottom:0.5px solid #e0ddd4;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar h1{font-size:16px;font-weight:500}
.sync-btn{font-size:13px;color:#185fa5;background:none;border:none;cursor:pointer;padding:6px 10px;border-radius:7px}
.sync-btn:active{background:#e6f1fb}
.content{padding:12px 16px}
.sl{font-size:11px;font-weight:500;color:#888780;letter-spacing:.06em;text-transform:uppercase;margin:16px 0 8px}
.sl:first-child{margin-top:0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.metric{background:#fff;border-radius:10px;padding:12px;border:0.5px solid #e0ddd4}
.metric .lbl{font-size:11px;color:#888780;margin-bottom:3px}
.metric .val{font-size:18px;font-weight:500}
.metric .sub{font-size:11px;color:#888780;margin-top:2px}
.card{background:#fff;border-radius:10px;border:0.5px solid #e0ddd4;margin-bottom:10px;overflow:hidden}
.badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px}
.b-ok{background:#eaf3de;color:#3b6d11}
.b-warn{background:#faeeda;color:#854f0b}
.b-danger{background:#fcebeb;color:#a32d2d}
.b-info{background:#e6f1fb;color:#185fa5}
.fc-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;background:#faeeda;color:#854f0b;font-weight:500;margin-left:4px;vertical-align:middle}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:0.5px solid #f1efe8;font-size:13px}
.row:last-child{border-bottom:none}
.row-label{color:#5f5e5a}
.row-val{font-weight:500;text-align:right}
.row-sub{font-size:11px;color:#888780;text-align:right;margin-top:1px}
.alert-item{display:flex;gap:10px;padding:10px 14px;border-bottom:0.5px solid #f1efe8;align-items:flex-start}
.alert-item:last-child{border-bottom:none}
.alert-text{font-size:13px;color:#5f5e5a;line-height:1.5}
.alert-text strong{color:#1a1a18}
.pbar{height:5px;background:#f1efe8;border-radius:3px;overflow:hidden;margin-top:4px}
.pfill{height:100%;border-radius:3px}
.pf-grp{padding:5px 14px;font-size:11px;font-weight:500;color:#888780;background:#f8f7f3;border-bottom:0.5px solid #e0ddd4}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#2c2c2a;color:#f1efe8;padding:10px 18px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:0.5px solid #e0ddd4;display:flex;padding:6px 0 env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;border:none;background:none;cursor:pointer;color:#888780;font-size:10px}
.nav-item.active{color:#185fa5}
.nav-icon{font-size:20px;line-height:1}
.mo-scroll{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:#fff;border-bottom:0.5px solid #e0ddd4}
.mo-scroll::-webkit-scrollbar{display:none}
.mo-chip{padding:5px 13px;border-radius:20px;border:0.5px solid #e0ddd4;background:none;font-size:13px;color:#5f5e5a;cursor:pointer;white-space:nowrap;flex-shrink:0}
.mo-chip.active{background:#185fa5;border-color:#185fa5;color:#fff;font-weight:500}
.settings-field{padding:12px 14px;border-bottom:0.5px solid #f1efe8}
.settings-field label{font-size:12px;color:#888780;display:block;margin-bottom:6px}
.settings-field input{width:100%;padding:8px 10px;border:0.5px solid #e0ddd4;border-radius:7px;font-size:13px;background:#fff;color:#1a1a18;outline:none}
.settings-field input:focus{border-color:#185fa5}
.empty{text-align:center;padding:40px 20px;color:#888780;font-size:14px;line-height:1.8}
.rate-box{flex:1;background:#f8f7f3;border-radius:8px;padding:9px;text-align:center}
.rate-box .rb-lbl{font-size:10px;color:#888780;margin-bottom:2px}
.rate-box .rb-val{font-size:15px;font-weight:500}
.rate-box .rb-unit{font-size:10px;color:#888780}
.not-connected{background:#faeeda;border-radius:10px;padding:12px 14px;margin-bottom:12px;font-size:13px;color:#633806;display:flex;gap:10px;align-items:flex-start}
/* Fixed-height chart containers */
.chart-box{position:relative;height:220px;width:100%;overflow:hidden}
.chart-box canvas{position:absolute!important;top:0!important;left:0!important;width:100%!important;height:100%!important}
.pos{color:#3b6d11}.neg{color:#a32d2d}.warn-c{color:#854f0b}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>💼 Portfolio Tracker</h1>
    <button class="sync-btn" onclick="syncAll()" id="syncBtn">↻ Sync</button>
  </div>
  <div id="subBar"></div>
  <div class="content" id="pageContent">
    <div class="empty">⚙️ Go to <strong>Settings</strong> to connect Google Sheets.</div>
  </div>
</div>
<div class="bottomnav">
  <button class="nav-item active" onclick="nav('dashboard')" id="nav-dashboard"><span class="nav-icon">📊</span><span>Dashboard</span></button>
  <button class="nav-item" onclick="nav('monthly')" id="nav-monthly"><span class="nav-icon">📅</span><span>Monthly</span></button>
  <button class="nav-item" onclick="nav('portfolio')" id="nav-portfolio"><span class="nav-icon">💼</span><span>Portfolio</span></button>
  <button class="nav-item" onclick="nav('settings')" id="nav-settings"><span class="nav-icon">⚙️</span><span>Settings</span></button>
</div>
<div class="toast" id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ── CONSTANTS ────────────────────────────────────────────────
var MONTHS=['May','Jun','Jul','Aug','Sep','Oct'];
var MKS=['may','jun','jul','aug','sep','oct'];
var CURRENT_MK='may';
var LAST_ACTUAL='apr';
var HIST_PERIODS=['start','jan','feb','mar','apr'];
var HIST_LABELS=['Start','Jan','Feb','Mar','Apr'];

// Fallback budgets — used only when Plan sheet not yet synced
var FB_BUDGET={admin:110000,food:1100000,healthcare:200000,household:200000,installment:9090000,others:100000,shopping:300000,sport:300000,telecom:800000,topup:500000,transport:600000,withdraw:2000000,zakat:0,rizka:1200000};

// Fallback income plan — used only when Plan sheet not yet synced
var FB_INC={
  salary:{may:17440701,jun:17440701,jul:17440701,aug:17440701,sep:17440701,oct:17440701},
  rd_return:{may:454627,jun:531332,jul:608324,aug:666855,sep:856856,oct:878819},
  deposito_return:{may:540000,jun:540000,jul:540000,aug:540000,sep:0,oct:0},
  sr025_coupon:{may:0,jun:0,jul:0,aug:0,sep:1106250,oct:1106250},
  sppd:{may:0,jun:0,jul:0,aug:0,sep:0,oct:0},
  other_income:{may:0,jun:0,jul:0,aug:0,sep:0,oct:0}
};

// Fallback investment plan — used only when Plan sheet not yet synced
var FB_INV={
  rd:{may:20000000,jun:20000000,jul:20000000,aug:15000000,sep:50000000,oct:5000000},
  sr025:{may:0,jun:0,jul:0,aug:0,sep:250000000,oct:0},
  germany_invest:{may:10000000,jun:10000000,jul:10000000,aug:10000000,sep:10000000,oct:10000000}
};

var EXPENSE_CATS=[
  {key:'admin',label:'Admin'},
  {key:'food',label:'Food & Drinks'},
  {key:'healthcare',label:'Healthcare'},
  {key:'household',label:'Household'},
  {key:'installment',label:'Installment'},
  {key:'others',label:'Others'},
  {key:'shopping',label:'Shopping'},
  {key:'sport',label:'Sport & Ent'},
  {key:'telecom',label:'Telecom'},
  {key:'topup',label:'Top Up'},
  {key:'transport',label:'Transportation'},
  {key:'withdraw',label:'Withdraw'},
  {key:'zakat',label:'Zakat'},
  {key:'rizka',label:'Rizka'}
];

var INCOME_CATS=[
  {key:'salary',label:'Salary'},
  {key:'rd_return',label:'Reksa Dana return'},
  {key:'deposito_return',label:'Deposito return'},
  {key:'sr025_coupon',label:'SR025 coupon'},
  {key:'sppd',label:'SPPD / Dinas'},
  {key:'other_income',label:'Other income'}
];

var INVEST_CATS=[
  {key:'rd',label:'RD top-up'},
  {key:'sr025',label:'SR025 T5 – SBN'},
  {key:'germany_invest',label:'Germany fund (Life Goals)'}
];

var RATE_CATS=['food','household','shopping','sport','topup','withdraw'];

var PF_INSTRUMENTS=[
  {key:'bni_saving',label:'BNI Saving',group:'liquid'},
  {key:'bni_lifegoals',label:'Life Goals',group:'liquid'},
  {key:'bsi_ops',label:'BSI Operational',group:'liquid'},
  {key:'bni_deposito',label:'BNI Deposito',group:'fixed',rate:'2.20% net',grossRate:0.0275,taxRate:0.20},
  {key:'bni_sbn',label:'SBN (existing)',group:'fixed'},
  {key:'sr025',label:'SR025 T5 (new Sep)',group:'fixed',rate:'5.31% net'},
  {key:'bni_rd',label:'BNI Reksa Dana',group:'market',rate:'5.50% net',netRate:0.055},
  {key:'mandiri_rd',label:'Mandiri RD',group:'market'},
  {key:'mandiri_saham',label:'Mandiri Saham',group:'market'},
  {key:'bsi_gold',label:'BSI Gold',group:'market'},
  {key:'jmo',label:'JMO',group:'retire',contrib:202667},
  {key:'bri_9189',label:'BRI-9189',group:'retire',contrib:202667},
  {key:'bri_8628',label:'BRI-8628',group:'retire',contrib:202666}
];

var GRP_LABELS={liquid:'Liquid',fixed:'Fixed Income',market:'Market-linked',retire:'Retirement'};
var GRP_COLORS={liquid:'#185fa5',fixed:'#3b6d11',market:'#ba7517',retire:'#73726c'};

// ── STATE ─────────────────────────────────────────────────────
var S={
  page:'dashboard',mk:'may',
  plan:{},income:{},expenses:{},invest:{},portfolio:{},
  settings:{url:'',token:''}
};

function load(){
  try{
    var d=JSON.parse(localStorage.getItem('ptv6')||'{}');
    S.plan=d.plan||{};S.income=d.income||{};S.expenses=d.expenses||{};
    S.invest=d.invest||{};S.portfolio=d.portfolio||{};
    S.settings=d.settings||{url:'',token:''};
  }catch(e){}
}
function save(){
  localStorage.setItem('ptv6',JSON.stringify({
    plan:S.plan,income:S.income,expenses:S.expenses,
    invest:S.invest,portfolio:S.portfolio,settings:S.settings
  }));
}

// ── CONNECTION CHECK ──────────────────────────────────────────
// True only when URL is set AND data has been pulled at least once
function connected(){
  return S.settings.url!=='' && (
    Object.keys(S.plan).length>0||
    Object.keys(S.income).length>0||
    Object.keys(S.expenses).length>0||
    Object.keys(S.portfolio).length>0
  );
}

function notConnectedBanner(){
  return '<div class="not-connected"><span style="font-size:16px;flex-shrink:0">🔌</span>'
    +'<div><strong>Not connected to Google Sheets.</strong><br>'
    +'Go to Settings and enter your Apps Script URL and token to see your data.</div></div>';
}

// ── FORMAT ────────────────────────────────────────────────────
function fmt(n){
  if(n===null||n===undefined||isNaN(n)||n===0)return'—';
  var a=Math.abs(Math.round(n)),s;
  if(a>=1000000000)s=(a/1000000000).toFixed(2)+'B';
  else if(a>=1000000)s=(a/1000000).toFixed(1)+'M';
  else if(a>=1000)s=Math.round(a/1000)+'K';
  else s=a.toLocaleString();
  return(n<0?'−':'')+'Rp '+s;
}
function fmtFull(n){return'Rp '+Math.round(Math.abs(n||0)).toLocaleString('id-ID');}
function toast(m){
  var t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

// ── DATA ACCESSORS ────────────────────────────────────────────
// Actuals — return 0 if not connected
function gExp(mk,k){
  if(!connected())return 0;
  var v=((S.expenses[mk]||{})[k]);
  return(v===null||v===undefined)?0:Number(v)||0;
}
function gInc(mk,k){
  if(!connected())return 0;
  var v=((S.income[mk]||{})[k]);
  return(v===null||v===undefined)?0:Number(v)||0;
}
function gInv(mk,k){
  if(!connected())return 0;
  var v=((S.invest[mk]||{})[k]);
  return(v===null||v===undefined)?0:Number(v)||0;
}

// Plan values — prefer Plan sheet, fall back to hardcoded, zero if not connected
function gBudget(k){
  if(!connected())return 0;
  var fromSheet=((S.plan.expenses||{})[k]||{})[CURRENT_MK];
  if(fromSheet!==undefined&&fromSheet!==null)return Number(fromSheet)||0;
  return FB_BUDGET[k]||0;
}
function gPlanInc(mk,k){
  if(!connected())return 0;
  var fromSheet=((S.plan.income||{})[k]||{})[mk];
  if(fromSheet!==undefined&&fromSheet!==null)return Number(fromSheet)||0;
  return(FB_INC[k]||{})[mk]||0;
}
function gPlanInv(k,mk){
  if(!connected())return 0;
  var fromSheet=((S.plan.investments||{})[k]||{})[mk];
  if(fromSheet!==undefined&&fromSheet!==null)return Number(fromSheet)||0;
  return(FB_INV[k]||{})[mk]||0;
}

// Totals
function totExp(mk){return EXPENSE_CATS.reduce(function(s,c){return s+gExp(mk,c.key);},0);}
function totInc(mk){return INCOME_CATS.reduce(function(s,c){return s+gInc(mk,c.key);},0);}
function totInv(mk){return INVEST_CATS.reduce(function(s,c){return s+gInv(mk,c.key);},0);}
function totBudget(){return EXPENSE_CATS.reduce(function(s,c){return s+gBudget(c.key);},0);}
function totPlanInc(mk){return INCOME_CATS.reduce(function(s,c){return s+gPlanInc(mk,c.key);},0);}
function hasExpData(mk){return connected()&&EXPENSE_CATS.some(function(c){return gExp(mk,c.key)>0;});}
function hasMonthData(mk){return connected()&&(INCOME_CATS.some(function(c){return gInc(mk,c.key)>0;})||EXPENSE_CATS.some(function(c){return gExp(mk,c.key)>0;}));}

// ── DATE HELPERS ──────────────────────────────────────────────
function daysLeft(){var n=new Date(),l=new Date(n.getFullYear(),n.getMonth()+1,0).getDate();return l-n.getDate()+1;}
function daysInMonth(){var n=new Date();return new Date(n.getFullYear(),n.getMonth()+1,0).getDate();}
function actualMK(){return['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'][new Date().getMonth()];}

// ── PORTFOLIO ─────────────────────────────────────────────────
function pfActual(key,period){
  if(!connected())return null;
  var d=S.portfolio[key];if(!d)return null;
  var v=d[period];return(v===null||v===undefined)?null:Number(v);
}
function pfForecast(instr,prev){
  if(prev===null)return null;
  var mk=CURRENT_MK;
  if(instr.key==='bni_deposito')return prev+prev*instr.grossRate*(1-instr.taxRate)/12;
  if(instr.key==='bni_rd')return prev+prev*(instr.netRate||0)/12+(gInv(mk,'rd')||gPlanInv('rd',mk));
  if(instr.key==='sr025')return prev+(mk==='sep'?(gInv(mk,'sr025')||250000000):0);
  if(instr.key==='bni_lifegoals')return prev+(gInv(mk,'germany_invest')||gPlanInv('germany_invest',mk));
  if(instr.key==='bni_saving'){
    var rdOut=gInv(mk,'rd')||gPlanInv('rd',mk);
    var lgOut=gInv(mk,'germany_invest')||gPlanInv('germany_invest',mk);
    var inc=totInc(mk)||totPlanInc(mk);
    var exp=totExp(mk)||totBudget();
    return prev+(inc-exp)-rdOut-lgOut;
  }
  if(instr.group==='retire')return prev+(instr.contrib||0);
  return prev;
}
function pfBal(key,period){
  if(!connected())return 0;
  var a=pfActual(key,period);if(a!==null)return a;
  if(period===CURRENT_MK){
    var ins=PF_INSTRUMENTS.find(function(i){return i.key===key;});
    if(ins)return pfForecast(ins,pfActual(key,LAST_ACTUAL));
  }
  return 0;
}
function totPf(period){return PF_INSTRUMENTS.reduce(function(s,i){return s+(pfBal(i.key,period)||0);},0);}
function grpTot(g,period){return PF_INSTRUMENTS.filter(function(i){return i.group===g;}).reduce(function(s,i){return s+(pfBal(i.key,period)||0);},0);}

function blendYield(){
  if(!connected())return 0;
  var rates={bni_deposito:0.022,bni_rd:0.055,sr025:0.0531},n=0,d=0;
  PF_INSTRUMENTS.forEach(function(i){var b=pfBal(i.key,LAST_ACTUAL)||0;if(rates[i.key]){n+=b*rates[i.key];d+=b;}});
  return d>0?n/d*100:0;
}
function annIncome(){
  if(!connected())return 0;
  var rates={bni_deposito:0.022,bni_rd:0.055,sr025:0.0531};
  return PF_INSTRUMENTS.reduce(function(s,i){return s+(rates[i.key]||0)*(pfBal(i.key,LAST_ACTUAL)||0);},0);
}
function emFund(){
  if(!connected())return 0;
  var liq=(pfBal('bni_saving',LAST_ACTUAL)||0)+(pfBal('bsi_ops',LAST_ACTUAL)||0);
  return totBudget()>0?liq/totBudget():0;
}

// ── CHART HELPER ──────────────────────────────────────────────
function mkChart(id,cfg){
  var el=document.getElementById(id);if(!el)return;
  if(el._ch){el._ch.destroy();el._ch=null;}
  cfg.options=cfg.options||{};
  cfg.options.responsive=true;
  cfg.options.maintainAspectRatio=false;
  el._ch=new Chart(el,cfg);
}
function chartOpts(extra){
  var o={
    plugins:{
      legend:{labels:{color:'#888780',font:{size:11},boxWidth:10,boxHeight:10}},
      tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+fmt(c.raw);}}}
    },
    scales:{
      x:{ticks:{color:'#888780'},grid:{display:false}},
      y:{ticks:{color:'#888780',callback:function(v){return'Rp '+(v/1000000000).toFixed(2)+'B';}},grid:{color:'rgba(0,0,0,0.05)'}}
    }
  };
  if(extra)Object.assign(o,extra);
  return o;
}

// ── NAV ───────────────────────────────────────────────────────
function nav(page){
  S.page=page;
  ['dashboard','monthly','portfolio','settings'].forEach(function(p){
    document.getElementById('nav-'+p).classList.toggle('active',p===page);
  });
  document.getElementById('subBar').innerHTML='';
  if(page==='dashboard')renderDashboard();
  else if(page==='monthly')renderMonthly();
  else if(page==='portfolio')renderPortfolio();
  else renderSettings();
}

// ── DASHBOARD ─────────────────────────────────────────────────
function renderDashboard(){
  var con=connected();
  var aprT=totPf(LAST_ACTUAL),mayT=totPf(CURRENT_MK),startT=totPf('start');
  var mom=aprT>0?(mayT-aprT)/aprT*100:0;
  var ef=emFund(),ai=annIncome(),ey=blendYield();
  var curE=totExp(CURRENT_MK),curI=totInc(CURRENT_MK),curV=totInv(CURRENT_MK);
  var net=curI-curE-curV,eb=totBudget();
  var h='';
  if(!con)h+=notConnectedBanner();
  h+='<div class="sl">Portfolio — April actual / May forecast</div>';
  h+='<div class="g2">';
  h+='<div class="metric"><div class="lbl">Total (Apr)</div><div class="val">'+fmt(aprT)+'</div><div class="sub">last complete month</div></div>';
  h+='<div class="metric"><div class="lbl">May forecast <span class="fc-badge">est.</span></div><div class="val '+(con?'pos':'')+'">'+fmt(mayT)+'</div><div class="sub">'+(con?(mom>=0?'+':'')+mom.toFixed(2)+'% vs Apr':'—')+'</div></div>';
  h+='</div><div class="g3">';
  h+='<div class="metric"><div class="lbl">YTD growth</div><div class="val '+(con?'pos':'')+'">'+fmt(aprT-startT)+'</div></div>';
  h+='<div class="metric"><div class="lbl">Blended yield</div><div class="val">'+(con?ey.toFixed(2)+'%':'—')+'</div><div class="sub">net</div></div>';
  h+='<div class="metric"><div class="lbl">Inv. income/yr</div><div class="val '+(con?'pos':'')+'">'+fmt(ai)+'</div></div>';
  h+='</div>';
  h+='<div class="sl">Emergency fund (Apr)</div>';
  h+='<div class="card"><div style="padding:12px 14px">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
  h+='<span style="font-size:13px">'+(con?ef.toFixed(1)+'× months covered':'—')+'</span>';
  if(con)h+='<span class="badge '+(ef>=6?'b-ok':ef>=3?'b-warn':'b-danger')+'">'+(ef>=6?'Healthy':ef>=3?'Low':'Critical')+'</span>';
  h+='</div>';
  h+='<div class="pbar" style="height:8px"><div class="pfill" style="width:'+(con?Math.min(100,ef/6*100).toFixed(0):0)+'%;background:'+(ef>=6?'#3b6d11':ef>=3?'#ba7517':'#a32d2d')+'"></div></div>';

// ── MONTHLY ───────────────────────────────────────────────────
function renderMonthly(){
  var bar='<div class="mo-scroll">';
  MONTHS.forEach(function(m,i){var mk=MKS[i];bar+='<button class="mo-chip'+(mk===S.mk?' active':'')+'" onclick="selMo(\''+mk+'\')">'+m+'</button>';});
  bar+='</div>';
  document.getElementById('subBar').innerHTML=bar;
  var con=connected();
  var mk=S.mk,tI=totInc(mk),tE=totExp(mk),tV=totInv(mk);
  var pI=totPlanInc(mk),pE=totBudget(),net=tI-tE-tV;
  var dl=daysLeft(),dim=daysInMonth(),dp=dim-dl+1;
  var amk=actualMK(),isCur=(mk===amk),hasExp=hasExpData(mk);
  var h='';
  h+='<div class="sl">Summary</div><div class="g2">';
  h+='<div class="metric"><div class="lbl">Income'+(mk===CURRENT_MK?'<span class="fc-badge">partial</span>':'')+'</div><div class="val '+(tI>0?'pos':'')+'">'+(tI>0?fmt(tI):'—')+'</div><div class="sub">'+(pI>0?'plan: '+fmt(pI):'—')+'</div></div>';
  h+='<div class="metric"><div class="lbl">Expenses</div><div class="val '+(tE>pE&&pE>0?'neg':tE>0?'':'')+'\">'+(tE>0?fmt(tE):'—')+'</div><div class="sub">'+(pE>0?'budget: '+fmt(pE):'—')+'</div></div>';
  h+='</div><div class="g2">';
  h+='<div class="metric"><div class="lbl">Invested</div><div class="val pos">'+(tV>0?fmt(tV):'—')+'</div></div>';
  h+='<div class="metric"><div class="lbl">Net flow</div><div class="val '+(tI>0?(net<0?'neg':'pos'):'')+'">'+(tI>0?fmt(net):'—')+'</div><div class="sub">'+(tI>0?(net<0?'from savings':'surplus'):'')+'</div></div>';
  h+='</div>';
  h+='<div class="sl">Daily & weekly spending rate</div>';
  if(!con){
    h+='<div class="card"><div style="padding:16px;text-align:center;font-size:13px;color:#888780">Connect Google Sheets to see spending rate.</div></div>';
  }else if(!isCur){
    var aLabel=MKS.indexOf(amk)>=0?MONTHS[MKS.indexOf(amk)]:amk;
    h+='<div class="card"><div style="padding:16px;text-align:center;font-size:13px;color:#888780">📅 Rate only available for current month.<br><span style="font-size:12px">Switch to <strong>'+aLabel+'</strong>.</span></div></div>';
  }else if(!hasExp){
    h+='<div class="card"><div style="padding:16px;text-align:center;font-size:13px;color:#888780">No expense data for '+MONTHS[MKS.indexOf(mk)]+' yet.<br><span style="font-size:12px">Update ExpenseActuals sheet and tap ↻ Sync.</span></div></div>';
  }else{
    h+='<div style="font-size:12px;color:#888780;margin-bottom:8px">'+dl+' days left · '+dp+' of '+dim+' days gone</div>';
    var ovR=0,ovB=0;
    RATE_CATS.forEach(function(k){ovB+=gBudget(k);ovR+=Math.max(0,gBudget(k)-gExp(mk,k));});
    var ovD=dl>0?ovR/dl:0,ovW=ovD*7,ovPct=ovB>0?(ovB-ovR)/ovB*100:0,ovC=ovPct>90?'#a32d2d':ovPct>70?'#ba7517':'#3b6d11';
    h+='<div class="card" style="margin-bottom:8px"><div style="padding:12px 14px">';
    h+='<div style="font-size:13px;font-weight:500;margin-bottom:10px">All tracked categories</div>';
    h+='<div style="display:flex;gap:8px;margin-bottom:10px">';
    h+='<div class="rate-box"><div class="rb-lbl">Daily</div><div class="rb-val" style="color:'+ovC+'">'+fmt(ovD)+'</div><div class="rb-unit">/day</div></div>';
    h+='<div class="rate-box"><div class="rb-lbl">Weekly</div><div class="rb-val" style="color:'+ovC+'">'+fmt(ovW)+'</div><div class="rb-unit">/week</div></div>';
    h+='</div><div class="pbar" style="height:7px"><div class="pfill" style="width:'+Math.min(100,ovPct).toFixed(0)+'%;background:'+ovC+'"></div></div>';
    h+='<div style="display:flex;justify-content:space-between;font-size:10px;color:#888780;margin-top:3px"><span>Spent: '+fmt(ovB-ovR)+'</span><span>Remaining: '+fmt(ovR)+'</span></div>';
    h+='</div></div>';
    RATE_CATS.forEach(function(k){
      var cat=EXPENSE_CATS.find(function(c){return c.key===k;});if(!cat)return;
      var bud=gBudget(k),spent=gExp(mk,k),rem=bud-spent,over=rem<0;
      var daily=dl>0&&!over?rem/dl:0,weekly=daily*7,pct=bud>0?Math.min(100,spent/bud*100):0;
      var bc=over?'#a32d2d':pct>85?'#ba7517':'#3b6d11',rc=over?'#a32d2d':pct>85?'#ba7517':'#1a1a18';
      h+='<div class="card" style="margin-bottom:8px"><div style="padding:11px 14px">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
      h+='<span style="font-size:13px;font-weight:500">'+cat.label+'</span>';
      h+='<span class="badge '+(over?'b-danger':pct>85?'b-warn':'b-ok')+'">'+(over?'Over budget':pct.toFixed(0)+'% used')+'</span></div>';
      if(!over){
        h+='<div style="display:flex;gap:8px;margin-bottom:10px">';
        h+='<div class="rate-box"><div class="rb-lbl">Daily</div><div class="rb-val" style="color:'+rc+'">'+fmt(daily)+'</div><div class="rb-unit">/day</div></div>';
        h+='<div class="rate-box"><div class="rb-lbl">Weekly</div><div class="rb-val" style="color:'+rc+'">'+fmt(weekly)+'</div><div class="rb-unit">/week</div></div>';
        h+='<div class="rate-box"><div class="rb-lbl">Left</div><div class="rb-val">'+fmt(rem)+'</div><div class="rb-unit">of '+fmt(bud)+'</div></div>';
        h+='</div>';
      }else{
        h+='<div style="background:#fcebeb;border-radius:7px;padding:8px 10px;font-size:12px;color:#a32d2d;margin-bottom:10px">Over by <strong>'+fmt(Math.abs(rem))+'</strong></div>';
      }
      h+='<div class="pbar" style="height:5px"><div class="pfill" style="width:'+Math.min(100,pct).toFixed(0)+'%;background:'+bc+'"></div></div>';
      h+='<div style="display:flex;justify-content:space-between;font-size:10px;color:#888780;margin-top:3px"><span>Spent: '+fmt(spent)+'</span><span>Budget: '+fmt(bud)+'</span></div>';
      h+='</div></div>';
    });
  }
  h+='<div class="sl">Expense breakdown</div><div class="card">';
  var anyE=false;
  EXPENSE_CATS.forEach(function(c){
    var a=gExp(mk,c.key),b=gBudget(c.key);
    if(!a&&!b)return;anyE=true;
    var ov=a>b&&b>0,df=b-a;
    h+='<div class="row"><span class="row-label" style="'+(ov?'color:#a32d2d':'')+'">'+c.label+(ov?' ▲':'')+'</span>';
    h+='<div><div class="row-val '+(ov?'neg':'')+'">'+(a>0?fmt(a):'—')+'</div>';
    if(b>0)h+='<div class="row-sub" style="color:'+(ov?'#a32d2d':df<b*0.1?'#888780':'#3b6d11')+'">'+(a>0?(df>=0?'−':'+')+''+fmt(Math.abs(df))+' vs budget':'budget: '+fmt(b))+'</div>';
    h+='</div></div>';
  });
  if(!anyE)h+='<div style="padding:12px 14px;font-size:13px;color:#888780">'+(con?'No expense data yet.':'Connect Google Sheets to see data.')+'</div>';
  h+='</div>';
  h+='<div class="sl">Income breakdown</div><div class="card">';
  var anyI=false;
  INCOME_CATS.forEach(function(c){
    var a=gInc(mk,c.key),p=gPlanInc(mk,c.key);
    if(!a&&!p)return;anyI=true;
    var df=a-p;
    h+='<div class="row"><span class="row-label">'+c.label+'</span>';
    h+='<div><div class="row-val '+(a>0?'pos':'')+'">'+(a>0?fmt(a):'—')+'</div>';
    if(p>0)h+='<div class="row-sub">'+(a>0?(df>=0?'+':'')+fmt(df)+' vs plan':'plan: '+fmt(p))+'</div>';
    h+='</div></div>';
  });
  if(!anyI)h+='<div style="padding:12px 14px;font-size:13px;color:#888780">'+(con?'No income data yet.':'Connect Google Sheets to see data.')+'</div>';
  h+='</div>';
  h+='<div class="sl">Investments</div><div class="card">';
  var anyV=false;
  INVEST_CATS.forEach(function(c){
    var a=gInv(mk,c.key),p=gPlanInv(c.key,mk);
    if(!p&&!a)return;anyV=true;
    var pct=p>0?Math.min(100,Math.round(a/p*100)):0,col=pct>=100?'#3b6d11':pct>0?'#ba7517':'#d3d1c7';
    h+='<div style="padding:9px 14px;border-bottom:0.5px solid #f1efe8">';
    h+='<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">';
    h+='<span class="row-label">'+c.label+'</span>';
    h+='<div><div class="row-val '+(a>=p&&a>0?'pos':'')+'">'+(a>0?fmt(a):'—')+'</div><div class="row-sub">plan: '+fmt(p)+'</div></div></div>';
    if(p>0)h+='<div class="pbar"><div class="pfill" style="width:'+pct+'%;background:'+col+'"></div></div>';
    h+='</div>';
  });
  if(!anyV)h+='<div style="padding:12px 14px;font-size:13px;color:#888780">'+(con?'No investment data yet.':'Connect Google Sheets to see data.')+'</div>';
  h+='</div>';
  set(h);
}

  h+='<div class="sl">Sync</div><div class="card">';
  h+='<div class="row"><span class="row-label">Sync all data</span><button onclick="syncAll()" style="padding:6px 14px;border-radius:7px;border:0.5px solid #e0ddd4;background:none;font-size:13px;cursor:pointer">↻ Sync all</button></div>';
  h+='<div class="row"><span class="row-label">Portfolio only</span><button onclick="syncPf()" style="padding:6px 14px;border-radius:7px;border:0.5px solid #e0ddd4;background:none;font-size:13px;cursor:pointer">Pull</button></div></div>';
  h+='<div class="sl">About</div><div class="card">';
  h+='<div class="row"><span class="row-label">Version</span><span>4.0 — May 2026</span></div>';
  h+='<div class="row"><span class="row-label">Current month</span><span>May 2026</span></div>';
  h+='<div class="row"><span class="row-label">Last complete</span><span>April 2026</span></div>';
  h+='<div class="row"><span class="row-label">Data source</span><span>Google Sheets (read-only)</span></div>';
  h+='<div class="row"><span class="row-label">Connected</span><span class="badge '+(connected()?'b-ok':'b-danger')+'">'+(connected()?'Yes':'No')+'</span></div></div>';
  set(h);
}
function saveCfg(){
  S.settings.url=document.getElementById('cfg_url').value.trim();
  S.settings.token=document.getElementById('cfg_tok').value.trim();
  save();toast('Settings saved ✓');
}

// ── ALERTS ────────────────────────────────────────────────────
function buildAlerts(mk){
  var a=[],tE=totExp(mk),pE=totBudget();
  if(!connected()){return[{t:'info',m:'Connect Google Sheets in Settings to see alerts.'}];}
  if(tE>0&&tE>pE)a.push({t:'danger',m:'<strong>Over budget by '+fmtFull(tE-pE)+'</strong> this month.'});
  EXPENSE_CATS.forEach(function(c){var act=gExp(mk,c.key),bud=gBudget(c.key);if(bud>0&&act>bud*1.15)a.push({t:'warn',m:'<strong>'+c.label+'</strong> over budget by '+fmtFull(act-bud)+'.'});});
  if(mk==='sep'&&gInv(mk,'sr025')===0)a.push({t:'warn',m:'<strong>SR025 not recorded.</strong> Window closes 16 Sep 2026.'});
  if(mk==='aug'||mk==='sep')a.push({t:'info',m:'SR025 window: <strong>21 Aug – 16 Sep 2026.</strong>'});
  if(!a.length)a.push({t:'ok',m:'<strong>All clear.</strong> Update Google Sheets and sync to see latest.'});
  return a;
}
function aIcon(t){return t==='danger'?'🔴':t==='warn'?'🟡':t==='ok'?'🟢':'🔵';}

// ── TABLE TOGGLE ──────────────────────────────────────────────
function toggleTable(){
  var w=document.getElementById('tbl-wrap'),t=document.getElementById('tbl-toggle');
  if(!w||!t)return;
  var open=w.style.display==='none';
  w.style.display=open?'block':'none';
  t.textContent=open?'Hide ▴':'Show ▾';
}

// ── API ───────────────────────────────────────────────────────
function api(action,payload){
  var url=S.settings.url;
  if(!url)return Promise.reject(new Error('No URL'));
  var body=JSON.stringify(Object.assign({action:action,token:S.settings.token},payload||{}));
  return fetch(url,{method:'POST',body:body,headers:{'Content-Type':'text/plain'}})
    .then(function(r){return r.json();})
    .then(function(j){if(!j.ok)throw new Error(j.error||'Error');return j;});
}
function syncAll(){
  if(!S.settings.url){toast('⚠ Set Script URL in Settings');nav('settings');return;}
  document.getElementById('syncBtn').textContent='↻ Syncing…';
  api('getAll').then(function(r){
    S.plan=r.plan||{};S.income=r.income||{};S.expenses=r.expenses||{};
    S.invest=r.invest||{};S.portfolio=r.portfolio||{};
    save();toast('Synced ✓');
    document.getElementById('syncBtn').textContent='↻ Sync';
    nav(S.page);
  }).catch(function(e){toast('Error: '+e.message);document.getElementById('syncBtn').textContent='↻ Sync';});
}
function syncPf(){
  api('getPortfolio').then(function(r){S.portfolio=r.portfolio||{};save();toast('Portfolio loaded ✓');})
  .catch(function(e){toast('Error: '+e.message);});
}

// ── UTILS ─────────────────────────────────────────────────────
function set(h){document.getElementById('pageContent').innerHTML=h;}

// ── INIT ──────────────────────────────────────────────────────
load();
nav('dashboard');
if(S.settings.url)syncAll();
</script>
