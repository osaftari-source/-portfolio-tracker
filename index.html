// ŌöĆŌöĆŌöĆ STATE ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
var state = {

  plan:       {},

  expenses:   {},   // {may:{food:..., telecom:...}, jun:{...}}
  invest:     {},   // {may:{rd:..., sr025:...}, jun:{...}}

};

function loadLocal() {
  try {
    var s = localStorage.getItem('pt_v5');
    if (s) {
      var p = JSON.parse(s);
      state.plan      = p.plan      || {};
      state.income    = p.income    || {};
      state.expenses  = p.expenses  || {};
      state.invest    = p.invest    || {};
      state.portfolio = p.portfolio || {};
      state.settings  = p.settings  || {scriptUrl:'',token:''};
    }
  } catch(e) {}
}

function saveLocal() {
  localStorage.setItem('pt_v5', JSON.stringify({
    plan:      state.plan,
    income:    state.income,
    expenses:  state.expenses,
    invest:    state.invest,
    portfolio: state.portfolio,
    settings:  state.settings
  }));
}

// ŌöĆŌöĆŌöĆ FORMATTERS ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
function fmt(n) {
  if (n===null||n===undefined||isNaN(n)) return 'ŌĆö';
  var abs=Math.abs(Math.round(n));
  var s;
  if (abs>=1000000000)   s=(abs/1000000000).toFixed(2)+'B';
  else if (abs>=1000000) s=(abs/1000000).toFixed(1)+'M';
  else if (abs>=1000)    s=Math.round(abs/1000)+'K';
  else                   s=abs.toLocaleString();
  return (n<0?'ŌłÆ':'')+'Rp '+s;
}
function fmtFull(n){return 'Rp '+Math.round(Math.abs(n||0)).toLocaleString('id-ID');}
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

// ŌöĆŌöĆŌöĆ DATA ACCESSORS ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
function getInc(mk, key) {
  var v = (state.income[mk]||{})[key];
  return (v===null||v===undefined) ? 0 : v;
}
function getExp(mk, key) {
  var v = (state.expenses[mk]||{})[key];
  return (v===null||v===undefined) ? 0 : v;
}
function getInv(mk, key) {
  var v = (state.invest[mk]||{})[key];
  return (v===null||v===undefined) ? 0 : v;
}
function getPlanInc(mk, key) { return (INC_PLAN[key]||{})[mk]||0; }
function getPlanExp(key)      { return EXP_BUDGET[key]||0; }
function getPlanInv(key, mk)  {
  var c = INVEST_CATS.find(function(x){return x.key===key;});
  return c ? (c.plan[mk]||0) : 0;
}

function totalInc(mk) { return INCOME_CATS.reduce(function(s,c){return s+getInc(mk,c.key);},0); }
function totalExp(mk) { return EXPENSE_CATS.reduce(function(s,c){return s+getExp(mk,c.key);},0); }
function totalInv(mk) { return INVEST_CATS.reduce(function(s,c){return s+getInv(mk,c.key);},0); }
function totalExpBudget() { return EXPENSE_CATS.reduce(function(s,c){return s+(EXP_BUDGET[c.key]||0);},0); }
function totalIncPlan(mk) { return INCOME_CATS.reduce(function(s,c){return s+getPlanInc(mk,c.key);},0); }

function hasMonthData(mk) {
  var hasInc = Object.values(state.income[mk]||{}).some(function(v){return v>0;});
  var hasExp = Object.values(state.expenses[mk]||{}).some(function(v){return v>0;});
  return hasInc||hasExp;
}

// ŌöĆŌöĆŌöĆ PORTFOLIO ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
function getPfActual(key, period) {
  var d = state.portfolio[key];
  if (!d) return null;
  var v = d[period];
  return (v===null||v===undefined) ? null : v;
}

function getForecast(instr, prevPeriod) {
  var prev = getPfActual(instr.key, prevPeriod);
  if (prev===null) return null;
  var mk = CURRENT_MK;

  if (instr.key==='bni_deposito') {
    return prev + prev * instr.grossRate * (1-instr.taxRate) / 12;
  }
  if (instr.key==='bni_rd') {
    var rdTopup = getInv(mk,'rd') || getPlanInv('rd',mk);
    return prev + prev * instr.netRate / 12 + rdTopup;
  }
  if (instr.key==='sr025') {
    var sr = mk==='sep' ? (getInv(mk,'sr025')||250000000) : 0;
    return prev + sr;
  }
  if (instr.key==='bni_lifegoals') {
    return prev + (getInv(mk,'germany_invest')||getPlanInv('germany_invest',mk));
  }
  if (instr.key==='bni_saving') {
    var rdOut  = getInv(mk,'rd')||getPlanInv('rd',mk);
    var lgOut  = getInv(mk,'germany_invest')||getPlanInv('germany_invest',mk);
    var inc    = totalInc(mk)||totalIncPlan(mk);
    var exp    = totalExp(mk)||totalExpBudget();
    return prev + (inc-exp) - rdOut - lgOut;
  }
  if (instr.group==='retire') {
    return prev + (instr.monthlyContrib||0);
  }
  return prev; // flat for others
}

function getPfBal(key, period) {
  var actual = getPfActual(key, period);
  if (actual!==null) return actual;
  if (period===CURRENT_MK) {
    var instr = PF_INSTRUMENTS.find(function(i){return i.key===key;});
    if (instr) return getForecast(instr, LAST_ACTUAL);
  }
  return 0;
}

function totalPf(period) {
  return PF_INSTRUMENTS.reduce(function(s,i){return s+(getPfBal(i.key,period)||0);},0);
}

function blendedYield() {
  var rates={bni_deposito:0.022,bni_rd:0.055,sr025:0.0531};
  var num=0,den=0;
  PF_INSTRUMENTS.forEach(function(i){
    var bal=getPfBal(i.key,LAST_ACTUAL)||0;
    if (rates[i.key]){num+=bal*rates[i.key];den+=bal;}
  });
  return den>0 ? num/den*100 : 0;
}

function annualInvestmentIncome() {
  var rates={bni_deposito:0.022,bni_rd:0.055,sr025:0.0531};
  return PF_INSTRUMENTS.reduce(function(s,i){
    return s+(rates[i.key]||0)*(getPfBal(i.key,LAST_ACTUAL)||0);
  },0);
}

function emergencyRatio() {
  var liquid=(getPfBal('bni_saving',LAST_ACTUAL)||0)+(getPfBal('bsi_ops',LAST_ACTUAL)||0);
  return totalExpBudget()>0 ? liquid/totalExpBudget() : 0;
}

// ŌöĆŌöĆŌöĆ NAVIGATION ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
function showPage(page) {
  state.activePage = page;
  ['dashboard','monthly','portfolio','settings'].forEach(function(p){
    document.getElementById('nav-'+p).classList.toggle('active',p===page);
  });
  if      (page==='dashboard') renderDashboard();
  else if (page==='monthly')   renderMonthly();
  else if (page==='portfolio') renderPortfolioPage();

function getRemainingDays() {
  var now = new Date();
  var lastDay = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  return lastDay - now.getDate() + 1; // inclusive of today
}
function getRemainingWeeks() { return getRemainingDays() / 7; }
function getDaysInMonth() {
  var now = new Date();
  return new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
}


function buildAlerts(mk) {
  var alerts=[], ea=totalExp(mk), eb=totalExpBudget();
  if (ea>0&&ea>eb) alerts.push({type:'danger',msg:'<strong>Over budget by '+fmtFull(ea-eb)+'</strong> this month.'});
  EXPENSE_CATS.forEach(function(c){
    var act=getExp(mk,c.key), bud=getPlanExp(c.key);
    if (bud>0&&act>bud*1.15) alerts.push({type:'warn',msg:'<strong>'+c.label+'</strong> over budget by '+fmtFull(act-bud)+'.'});
  });
  if (mk==='sep'&&getInv(mk,'sr025')===0) alerts.push({type:'warn',msg:'<strong>SR025 not recorded.</strong> Window closes 16 Sep 2026.'});
  if (mk==='aug'||mk==='sep') alerts.push({type:'info',msg:'SR025 window: <strong>21 Aug ŌĆō 16 Sep 2026.</strong>'});
  if (!alerts.length) alerts.push({type:'ok',msg:'<strong>All clear</strong> for '+MONTHS[MKS.indexOf(mk)]+'. Update Google Sheets and sync to see latest.'});
  return alerts;
}
function aEmoji(t){return t==='danger'?'­¤ö┤':t==='warn'?'­¤¤Ī':t==='ok'?'­¤¤ó':'­¤öĄ';}

function saveSettings() {
  state.settings.scriptUrl=document.getElementById('cfg_url').value.trim();

}

// ŌöĆŌöĆŌöĆ API ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
function apiCall(action,payload) {
  var url=state.settings.scriptUrl;
  if (!url) return Promise.reject(new Error('No script URL'));
  var body=JSON.stringify(Object.assign({action:action,token:state.settings.token},payload||{}));
  return fetch(url,{method:'POST',body:body,headers:{'Content-Type':'text/plain'}})
    .then(function(r){return r.json();})
    .then(function(j){if(!j.ok)throw new Error(j.error||'Error');return j;});
}

function fetchPortfolio() {
  return apiCall('getPortfolio').then(function(r){state.portfolio=r.portfolio||{};saveLocal();}).catch(function(e){showToast('Portfolio error: '+e.message);});
}

function syncAll() {
  if (!state.settings.scriptUrl){showToast('ŌÜĀ Set Script URL in Settings');showPage('settings');return;}
  document.getElementById('syncBtn').textContent='Ōå╗ SyncingŌĆ”';
  // Use getAll to fetch everything in one call
  apiCall('getAll').then(function(r){
    state.plan      = r.plan      || {};
    state.income    = r.income    || {};
    state.expenses  = r.expenses  || {};
    state.invest    = r.invest    || {};
    state.portfolio = r.portfolio || {};
    saveLocal();
    showToast('Synced Ō£ō');
    document.getElementById('syncBtn').textContent='Ōå╗ Sync';
    showPage(state.activePage);
  }).catch(function(e){
    showToast('Sync error: '+e.message);
    document.getElementById('syncBtn').textContent='Ōå╗ Sync';
  });
}
