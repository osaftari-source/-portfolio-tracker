<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#185fa5">
<title>Portfolio Tracker</title>
<link rel="manifest" href="manifest.json">
<style>
:root{
  --blue:#185fa5;--blue-soft:#e6f1fb;--bg:#f5f5f0;--card:#fff;--text:#1a1a18;
  --muted:#888780;--line:#e0ddd4;--line-soft:#f1efe8;--green:#3b6d11;
  --green-soft:#eaf3de;--orange:#854f0b;--orange-soft:#faeeda;
  --red:#a32d2d;--red-soft:#fcebeb;--shadow:0 1px 2px rgba(0,0,0,.02)
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;min-height:100vh}
button,input{font:inherit}
button{cursor:pointer}
.app{max-width:480px;margin:0 auto;padding-bottom:84px}
.topbar{background:var(--card);border-bottom:.5px solid var(--line);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar h1{font-size:16px;font-weight:600}
.sync-btn{font-size:13px;color:var(--blue);background:none;border:none;padding:6px 10px;border-radius:8px}
.sync-btn:active{background:var(--blue-soft)}
.content{padding:12px 16px}
.section{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin:16px 0 8px}
.section:first-child{margin-top:0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.metric{background:var(--card);border-radius:12px;padding:12px;border:.5px solid var(--line);box-shadow:var(--shadow)}
.metric .lbl{font-size:11px;color:var(--muted);margin-bottom:3px}
.metric .val{font-size:18px;font-weight:600;letter-spacing:-.01em}
.metric .sub{font-size:11px;color:var(--muted);margin-top:2px}
.card{background:var(--card);border-radius:12px;border:.5px solid var(--line);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow)}
.row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:9px 14px;border-bottom:.5px solid var(--line-soft);font-size:13px}
.row:last-child{border-bottom:none}
.row-label{color:#5f5e5a}
.row-val{font-weight:600;text-align:right}
.row-sub{font-size:11px;color:var(--muted);text-align:right;margin-top:1px}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
.b-ok{background:var(--green-soft);color:var(--green)}
.b-warn{background:var(--orange-soft);color:var(--orange)}
.b-danger{background:var(--red-soft);color:var(--red)}
.b-info{background:var(--blue-soft);color:var(--blue)}
.fc-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;background:var(--orange-soft);color:var(--orange);font-weight:600;margin-left:4px;vertical-align:middle}
.alert-item{display:flex;gap:10px;padding:10px 14px;border-bottom:.5px solid var(--line-soft);align-items:flex-start}
.alert-item:last-child{border-bottom:none}
.alert-text{font-size:13px;color:#5f5e5a;line-height:1.5}
.alert-text strong{color:var(--text)}
.pbar{height:5px;background:var(--line-soft);border-radius:3px;overflow:hidden;margin-top:4px}
.pfill{height:100%;border-radius:3px}
.pf-grp{padding:6px 14px;font-size:11px;font-weight:600;color:var(--muted);background:#f8f7f3;border-bottom:.5px solid var(--line)}
.toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%);background:#2c2c2a;color:#f1efe8;padding:10px 18px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;white-space:nowrap;max-width:92vw;text-overflow:ellipsis;overflow:hidden}
.toast.show{opacity:1}
.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:.5px solid var(--line);display:flex;padding:6px 0 calc(6px + env(safe-area-inset-bottom));z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;border:none;background:none;color:var(--muted);font-size:10px}
.nav-item.active{color:var(--blue);font-weight:600}
.nav-icon{font-size:20px;line-height:1}
.mo-scroll{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:var(--card);border-bottom:.5px solid var(--line)}
.mo-scroll::-webkit-scrollbar{display:none}
.mo-chip{padding:5px 13px;border-radius:20px;border:.5px solid var(--line);background:none;font-size:13px;color:#5f5e5a;white-space:nowrap;flex-shrink:0}
.mo-chip.active{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600}
.settings-field{padding:12px 14px;border-bottom:.5px solid var(--line-soft)}
.settings-field label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px}
.settings-field input{width:100%;padding:9px 10px;border:.5px solid var(--line);border-radius:8px;font-size:13px;background:var(--card);color:var(--text);outline:none}
.settings-field input:focus{border-color:var(--blue)}
.primary-btn{width:100%;padding:10px;border-radius:8px;font-size:14px;font-weight:600;border:none;background:var(--blue);color:#fff}
.secondary-btn{padding:6px 14px;border-radius:8px;border:.5px solid var(--line);background:none;font-size:13px}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;line-height:1.8}
.rate-box{flex:1;background:#f8f7f3;border-radius:8px;padding:9px;text-align:center}
.rate-box .rb-lbl{font-size:10px;color:var(--muted);margin-bottom:2px}
.rate-box .rb-val{font-size:15px;font-weight:600}
.rate-box .rb-unit{font-size:10px;color:var(--muted)}
.not-connected{background:var(--orange-soft);border-radius:12px;padding:12px 14px;margin-bottom:12px;font-size:13px;color:#633806;display:flex;gap:10px;align-items:flex-start}
.chart-box{position:relative;height:220px;width:100%;overflow:hidden}
.chart-box canvas{position:absolute!important;top:0!important;left:0!important;width:100%!important;height:100%!important}
.pos{color:var(--green)}.neg{color:var(--red)}.warn-c{color:var(--orange)}
.small-note{font-size:12px;color:var(--muted);padding:8px 14px}
@media (max-width:360px){.metric .val{font-size:16px}.g3{gap:6px}.content{padding:10px 12px}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>💼 Portfolio Tracker</h1>
    <button class="sync-btn" onclick="syncAll()" id="syncBtn">↻ Sync</button>
  </div>
  <div id="subBar"></div>
  <div class="content" id="pageContent">
    <div class="empty">⚙️ Go to <strong>Settings</strong> to connect Google Sheets.</div>
  </div>
</div>

<div class="bottomnav">
  <button class="nav-item active" onclick="nav('dashboard')" id="nav-dashboard"><span class="nav-icon">📊</span><span>Dashboard</span></button>
  <button class="nav-item" onclick="nav('monthly')" id="nav-monthly"><span class="nav-icon">📅</span><span>Monthly</span></button>
  <button class="nav-item" onclick="nav('portfolio')" id="nav-portfolio"><span class="nav-icon">💼</span><span>Portfolio</span></button>
  <button class="nav-item" onclick="nav('settings')" id="nav-settings"><span class="nav-icon">⚙️</span><span>Settings</span></button>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
'use strict';

/* ============================================================
   Portfolio Tracker — Clean No-Offline Frontend v2
   - Vanilla JS
   - Dynamic month handling
   - Google Sheets via Apps Script
   - localStorage cache
   ============================================================ */

// ── CALENDAR ─────────────────────────────────────────────────
var MONTH_KEYS=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
var MONTH_LABELS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var TODAY=new Date();

function mkFromDate(d){return MONTH_KEYS[d.getMonth()];}
function labelFromMk(mk){var i=MONTH_KEYS.indexOf(mk);return i>=0?MONTH_LABELS[i]:mk.toUpperCase();}
function fullLabelFromMk(mk){var i=MONTH_KEYS.indexOf(mk);return i>=0?new Date(TODAY.getFullYear(),i,1).toLocaleString('en-US',{month:'long'}):mk;}
function addMonthsKey(mk,n){var i=MONTH_KEYS.indexOf(mk);return MONTH_KEYS[(i+n+1200)%12];}
function prevMk(mk){return addMonthsKey(mk,-1);}
function currentMk(){return mkFromDate(TODAY);}
function rollingMonths(startMk,count){var a=[];for(var i=0;i<count;i++)a.push(addMonthsKey(startMk,i));return a;}
function daysLeft(){var n=new Date(),last=new Date(n.getFullYear(),n.getMonth()+1,0).getDate();return last-n.getDate()+1;}
function daysInMonth(){var n=new Date();return new Date(n.getFullYear(),n.getMonth()+1,0).getDate();}
function actualMK(){return currentMk();}

// NOTE: prevMk('jan') returns 'dec' (prior calendar year). Month keys are year-agnostic.
// If this app crosses a year boundary, 'dec' will look up the same year's portfolio data.
// Year tracking is not yet implemented — to be addressed in a future version.
var CURRENT_MK=currentMk();
var LAST_ACTUAL=prevMk(CURRENT_MK);
var NAV_MONTHS=rollingMonths(CURRENT_MK,6);

// ── CATEGORIES AND ASSUMPTIONS ───────────────────────────────
var EXPENSE_CATS=[
  {key:'admin',label:'Admin'},
  {key:'food',label:'Food & Drinks'},
  {key:'healthcare',label:'Healthcare'},
  {key:'household',label:'Household'},
  {key:'installment',label:'Installment'},
  {key:'others',label:'Others'},
  {key:'shopping',label:'Shopping'},
  {key:'sport',label:'Sport & Ent'},
  {key:'telecom',label:'Telecom'},
  {key:'topup',label:'Top Up'},
  {key:'transport',label:'Transportation'},
  {key:'withdraw',label:'Withdraw'},
  {key:'zakat',label:'Zakat'},
  {key:'rizka',label:'Rizka'},
  {key:'incidental',label:'Incidental'}
];

var INCOME_CATS=[
  {key:'salary',label:'Salary'},
  {key:'rd_return',label:'Reksa Dana return'},
  {key:'deposito_return',label:'Deposito return'},
  {key:'sr025_coupon',label:'SR025 coupon'},
  {key:'sppd',label:'SPPD / Dinas'},
  {key:'other_income',label:'Other income'}
];

var INVEST_CATS=[
  {key:'rd',label:'RD top-up'},
  {key:'sr025',label:'SR025 T5 – SBN'},
  {key:'germany_invest',label:'Germany fund (Life Goals)'}
];

var RATE_CATS=['food','household','shopping','sport','topup','withdraw'];

var PF_INSTRUMENTS=[
  {key:'bni_saving',label:'BNI Saving',group:'liquid'},
  {key:'bni_lifegoals',label:'Life Goals',group:'liquid'},
  {key:'bsi_ops',label:'BSI Operational',group:'liquid'},
  {key:'bni_deposito',label:'BNI Deposito',group:'fixed',rate:'principal only'},
  {key:'bni_sbn',label:'SBN (existing)',group:'fixed'},
  {key:'sr025',label:'SR025 T5',group:'fixed',rate:'5.31% net'},
  {key:'bni_rd',label:'BNI Reksa Dana',group:'market',rate:'5.50% net'},
  {key:'mandiri_rd',label:'Mandiri RD',group:'market'},
  {key:'mandiri_saham',label:'Mandiri Saham',group:'market'},
  {key:'bsi_gold',label:'BSI Gold',group:'market'},
  {key:'jmo',label:'JMO',group:'retire'},
  {key:'bri_9189',label:'BRI-9189',group:'retire'},
  {key:'bri_8628',label:'BRI-8628',group:'retire'}
];

var GRP_LABELS={liquid:'Liquid',fixed:'Fixed Income',market:'Market-linked',retire:'Retirement'};
var GRP_COLORS={liquid:'#185fa5',fixed:'#3b6d11',market:'#ba7517',retire:'#73726c'};

// Centralized forecast assumptions.
// Keep these here for now. Later they can be moved to a Google Sheets Assumptions tab.
var ASSUMPTIONS={
  deposito_gross_rate:0.0275,
  deposito_tax_rate:0.20,
  rd_expected_return:0.055,
  sr025_net_rate:0.0531,
  jmo_monthly_contrib:202667,
  bri_9189_monthly_contrib:202667,
  bri_8628_monthly_contrib:202666
};

function assumption(key,fallback){
  var v=ASSUMPTIONS[key];
  return (v===null||v===undefined||v==='')?fallback:v;
}


// fallback budget/plan used only when connected but Plan sheet line is missing
var FB_BUDGET={admin:110000,food:1100000,healthcare:200000,household:200000,installment:9090000,others:100000,shopping:300000,sport:300000,telecom:800000,topup:500000,transport:600000,withdraw:2000000,zakat:0,rizka:1200000,incidental:0};
var FB_INC={
  salary:{may:17440701,jun:17440701,jul:17440701,aug:17440701,sep:17440701,oct:17440701},
  rd_return:{may:454627,jun:531332,jul:608324,aug:666855,sep:856856,oct:878819},
  deposito_return:{may:540000,jun:540000,jul:540000,aug:540000,sep:0,oct:0},
  sr025_coupon:{sep:1106250,oct:1106250},
  sppd:{}, other_income:{}
};
var FB_INV={rd:{may:20000000,jun:20000000,jul:20000000,aug:15000000,sep:50000000,oct:5000000},sr025:{sep:250000000},germany_invest:{may:10000000,jun:10000000,jul:10000000,aug:10000000,sep:10000000,oct:10000000}};

// ── STATE ─────────────────────────────────────────────────────
var S={
  page:'dashboard',
  mk:CURRENT_MK,
  plan:{},income:{},expenses:{},invest:{},portfolio:{},
  meta:{lastSync:null,lastError:null},
  settings:{url:'',token:''}
};

function load(){
  try{
    var d=JSON.parse(localStorage.getItem('ptv8')||localStorage.getItem('ptv7')||localStorage.getItem('ptv6')||'{}');
    S.plan=d.plan||{};S.income=d.income||{};S.expenses=d.expenses||{};S.invest=d.invest||{};S.portfolio=d.portfolio||{};
    S.settings=d.settings||{url:'',token:''};S.meta=d.meta||{lastSync:null,lastError:null};
    if(!MONTH_KEYS.includes(S.mk))S.mk=CURRENT_MK;
  }catch(e){console.warn('Load failed',e);}
}
function save(){
  localStorage.setItem('ptv8',JSON.stringify({plan:S.plan,income:S.income,expenses:S.expenses,invest:S.invest,portfolio:S.portfolio,settings:S.settings,meta:S.meta}));
}
function connected(){
  return !!S.settings.url && (hasKeys(S.plan)||hasKeys(S.income)||hasKeys(S.expenses)||hasKeys(S.portfolio)||hasKeys(S.invest));
}
function hasKeys(o){return o&&Object.keys(o).length>0;}

// ── FORMAT ────────────────────────────────────────────────────
function fmt(n,opts){
  opts=opts||{};
  if(n===null||n===undefined||isNaN(Number(n)))return '—';
  n=Number(n);
  if(n===0&&!opts.showZero)return '—';
  var a=Math.abs(Math.round(n)),s;
  if(a>=1000000000)s=(a/1000000000).toFixed(2)+'B';
  else if(a>=1000000)s=(a/1000000).toFixed(1)+'M';
  else if(a>=1000)s=Math.round(a/1000)+'K';
  else s=a.toLocaleString('id-ID');
  return (n<0?'−':'')+'Rp '+s;
}
function fmtFull(n){
  if(n===null||n===undefined||isNaN(Number(n)))return '—';
  return 'Rp '+Math.round(Math.abs(Number(n))).toLocaleString('id-ID');
}
function fmtPct(n){return isFinite(n)?(n>=0?'+':'')+n.toFixed(2)+'%':'—';}
function fmtDateTime(iso){
  if(!iso)return 'Never';
  try{return new Date(iso).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});}
  catch(e){return iso;}
}
function toast(m){
  var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
  clearTimeout(t._timer);t._timer=setTimeout(function(){t.classList.remove('show');},2600);
}
function set(h){document.getElementById('pageContent').innerHTML=h;}
function notConnectedBanner(){
  return '<div class="not-connected"><span style="font-size:16px;flex-shrink:0">🔌</span><div><strong>Not connected to Google Sheets.</strong><br>Go to Settings and enter Apps Script URL and token.</div></div>';
}
function dataNote(){
  return '<div class="small-note">Last sync: <strong>'+fmtDateTime(S.meta.lastSync)+'</strong>'+(S.meta.lastError?' · Last error: '+escapeHtml(S.meta.lastError):'')+'</div>';
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c];});}

// ── DATA ACCESSORS ────────────────────────────────────────────
function valueAt(obj,mk,k){
  if(!connected())return null;
  var v=((obj[mk]||{})[k]);
  return (v===null||v===undefined||v==='')?null:Number(v)||0;
}
function gExp(mk,k){return valueAt(S.expenses,mk,k);}
function gInc(mk,k){return valueAt(S.income,mk,k);}
function gInv(mk,k){return valueAt(S.invest,mk,k);}
function num(v){return v===null||v===undefined||isNaN(Number(v))?0:Number(v);}

function gBudget(k,mk){
  mk=mk||CURRENT_MK;
  if(!connected())return null;
  var fromSheet=((S.plan.expenses||{})[k]||{})[mk];
  if(fromSheet!==undefined&&fromSheet!==null)return Number(fromSheet)||0;
  return FB_BUDGET[k]||0;
}
function gPlanInc(mk,k){
  if(!connected())return null;
  var fromSheet=((S.plan.income||{})[k]||{})[mk];
  if(fromSheet!==undefined&&fromSheet!==null)return Number(fromSheet)||0;
  return ((FB_INC[k]||{})[mk]||0);
}
function gPlanInv(k,mk){
  if(!connected())return null;
  var fromSheet=((S.plan.investments||{})[k]||{})[mk];
  if(fromSheet!==undefined&&fromSheet!==null)return Number(fromSheet)||0;
  return ((FB_INV[k]||{})[mk]||0);
}
function total(list,fn){return list.reduce(function(s,c){return s+num(fn(c));},0);}
function totExp(mk){return total(EXPENSE_CATS,function(c){return gExp(mk,c.key);});}
function totInc(mk){return total(INCOME_CATS,function(c){return gInc(mk,c.key);});}
function totInv(mk){return total(INVEST_CATS,function(c){return gInv(mk,c.key);});}
function totBudget(mk){return total(EXPENSE_CATS,function(c){return gBudget(c.key,mk);});}
function totPlanInc(mk){return total(INCOME_CATS,function(c){return gPlanInc(mk,c.key);});}
function controlledExpenseCats(){return EXPENSE_CATS.filter(function(c){return c.key!=='incidental';});}
function totControlledExp(mk){return total(controlledExpenseCats(),function(c){return gExp(mk,c.key);});}
function totControlledBudget(mk){return total(controlledExpenseCats(),function(c){return gBudget(c.key,mk);});}
function estIncome(mk){
  return total(INCOME_CATS,function(c){
    var actual=gInc(mk,c.key), plan=gPlanInc(mk,c.key);
    return actual!==null?actual:plan;
  });
}
function estInvestByKey(mk,key){
  var actual=gInv(mk,key), plan=gPlanInv(key,mk);
  return num(actual!==null?actual:plan);
}
function hasExpData(mk){return connected()&&EXPENSE_CATS.some(function(c){return gExp(mk,c.key)!==null;});}
function hasMonthData(mk){return connected()&&(INCOME_CATS.some(function(c){return gInc(mk,c.key)!==null;})||EXPENSE_CATS.some(function(c){return gExp(mk,c.key)!==null;}));}

// ── PORTFOLIO AND FORECAST ───────────────────────────────────
function pfActual(key,period){
  if(!connected())return null;
  var d=S.portfolio[key];if(!d)return null;
  var v=d[period];return(v===null||v===undefined||v==='')?null:Number(v)||0;
}
function pfForecast(instr,prev,mk){
  if(prev===null||prev===undefined)return null;
  mk=mk||CURRENT_MK;

  // Deposito value is principal only. Interest is handled as income via deposito_return.
  if(instr.key==='bni_deposito')return prev;

  // Conservative RD forecast: previous balance earns estimated return; top-up is added separately.
  if(instr.key==='bni_rd'){
    var rdTopup=estInvestByKey(mk,'rd');
    var rdRate=assumption('rd_expected_return',0.055);
    return prev+prev*rdRate/12+rdTopup;
  }

  if(instr.key==='sr025')return prev+estInvestByKey(mk,'sr025');
  if(instr.key==='bni_lifegoals')return prev+estInvestByKey(mk,'germany_invest');

  if(instr.key==='bni_saving'){
    var rdOut=estInvestByKey(mk,'rd');
    var lgOut=estInvestByKey(mk,'germany_invest');
    var srOut=estInvestByKey(mk,'sr025');
    var inc=estIncome(mk);
    var exp=totExp(mk); // actual expenses only, including incidental
    return prev+inc-exp-rdOut-lgOut-srOut;
  }

  if(instr.key==='jmo')return prev+assumption('jmo_monthly_contrib',202667);
  if(instr.key==='bri_9189')return prev+assumption('bri_9189_monthly_contrib',202667);
  if(instr.key==='bri_8628')return prev+assumption('bri_8628_monthly_contrib',202666);

  // Default method for market/manual assets: carry forward previous month.
  return prev;
}
function pfBal(key,period){
  if(!connected())return 0;
  var a=pfActual(key,period);if(a!==null)return a;
  if(period===CURRENT_MK){
    var ins=PF_INSTRUMENTS.find(function(i){return i.key===key;});
    if(ins)return pfForecast(ins,pfActual(key,LAST_ACTUAL),period);
  }
  return 0;
}
function totPf(period){return PF_INSTRUMENTS.reduce(function(s,i){return s+num(pfBal(i.key,period));},0);}
function grpTot(g,period){return PF_INSTRUMENTS.filter(function(i){return i.group===g;}).reduce(function(s,i){return s+num(pfBal(i.key,period));},0);}
function blendYield(){
  if(!connected())return 0;
  var rates={
    bni_deposito:assumption('deposito_gross_rate',0.0275)*(1-assumption('deposito_tax_rate',0.20)),
    bni_rd:assumption('rd_expected_return',0.055),

  h+='<div class="card"><div style="padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="toggleTable()"><span style="font-size:13px;font-weight:600">Detailed numbers</span><span id="tbl-toggle" style="font-size:12px;color:#185fa5">Show ▾</span></div><div id="tbl-wrap" style="display:none;overflow-x:auto;padding:0 0 10px"><table style="width:100%;border-collapse:collapse;font-size:12px;min-width:360px"><thead><tr><th style="text-align:left;padding:6px 14px;color:#888780;font-weight:600;border-bottom:.5px solid #e0ddd4">Instrument</th>';
  histLabels.forEach(function(l){h+='<th style="text-align:right;padding:6px 8px;color:#888780;font-weight:600;border-bottom:.5px solid #e0ddd4">'+l+'</th>';});
  h+='</tr></thead><tbody>';
  PF_INSTRUMENTS.forEach(function(i){h+='<tr><td style="padding:4px 14px;color:#5f5e5a;white-space:nowrap">'+i.label+'</td>';histPeriods.forEach(function(p){h+='<td style="text-align:right;padding:4px 8px">'+fmt(pfBal(i.key,p))+'</td>';});h+='</tr>';});
  h+='<tr style="font-weight:600;border-top:.5px solid #e0ddd4"><td style="padding:6px 14px">Total</td>';histPeriods.forEach(function(p){h+='<td style="text-align:right;padding:6px 8px">'+fmt(totPf(p))+'</td>';});h+='</tr></tbody></table></div></div>';
  set(h);
  setTimeout(function(){
    var gp=Object.keys(GRP_LABELS),lineActual=histPeriods.map(function(p){return totPf(p);});
    mkChart('gc',{type:'line',data:{labels:histLabels.concat([labelFromMk(CURRENT_MK)+' (est.)']),datasets:[
      {label:'Actual',data:lineActual.concat([null]),borderColor:'#185fa5',backgroundColor:'rgba(24,95,165,0.07)',fill:true,tension:.3,pointRadius:4,borderWidth:2,spanGaps:false},
      {label:'Forecast',data:Array(histPeriods.length-1).fill(null).concat([totPf(LAST_ACTUAL),totPf(CURRENT_MK)]),borderColor:'#ba7517',backgroundColor:'transparent',borderDash:[6,4],tension:.3,pointRadius:4,borderWidth:2,spanGaps:false}
    ]},options:chartOpts()});
    mkChart('hbar',{type:'bar',data:{labels:histLabels,datasets:gp.map(function(g){return{label:GRP_LABELS[g],data:histPeriods.map(function(p){return grpTot(g,p);}),backgroundColor:GRP_COLORS[g],borderWidth:0};})},options:chartOpts({plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+fmt(c.raw,{showZero:true});}}}},scales:{x:{stacked:true,ticks:{color:'#888780'},grid:{display:false}},y:{stacked:true,ticks:{color:'#888780',callback:function(v){return'Rp '+(v/1000000000).toFixed(2)+'B';}},grid:{color:'rgba(0,0,0,.05)'}}}})});
    mkChart('hline',{type:'line',data:{labels:histLabels,datasets:gp.map(function(g){return{label:GRP_LABELS[g],data:histPeriods.map(function(p){return grpTot(g,p);}),borderColor:GRP_COLORS[g],backgroundColor:'transparent',tension:.3,pointRadius:3,borderWidth:2,pointBackgroundColor:GRP_COLORS[g]};})},options:chartOpts()});
  },100);
}
function toggleTable(){var w=document.getElementById('tbl-wrap'),t=document.getElementById('tbl-toggle');if(!w||!t)return;var open=w.style.display==='none';w.style.display=open?'block':'none';t.textContent=open?'Hide ▴':'Show ▾';}

// ── SETTINGS ──────────────────────────────────────────────────
function renderSettings(){
  var h='<div class="section">Google Sheets connection</div><div class="card"><div class="settings-field"><label>Apps Script URL</label><input type="url" id="cfg_url" value="'+escapeHtml(S.settings.url)+'" placeholder="https://script.google.com/macros/s/.../exec"></div><div class="settings-field"><label>Secret token</label><input type="text" id="cfg_tok" value="'+escapeHtml(S.settings.token)+'" placeholder="your-secret-token"></div><div style="padding:10px 14px"><button onclick="saveCfg()" class="primary-btn">Save settings</button></div></div>';
  h+='<div class="section">Sync</div><div class="card"><div class="row"><span class="row-label">Sync all data</span><button onclick="syncAll()" class="secondary-btn">↻ Sync all</button></div><div class="row"><span class="row-label">Portfolio only</span><button onclick="syncPf()" class="secondary-btn">Pull</button></div><div class="row"><span class="row-label">Last sync</span><span>'+fmtDateTime(S.meta.lastSync)+'</span></div></div>';
  h+='<div class="section">About</div><div class="card"><div class="row"><span class="row-label">Version</span><span>Clean v2 — No Offline</span></div><div class="row"><span class="row-label">Current month</span><span>'+fullLabelFromMk(CURRENT_MK)+' '+TODAY.getFullYear()+'</span></div><div class="row"><span class="row-label">Last complete</span><span>'+fullLabelFromMk(LAST_ACTUAL)+' '+TODAY.getFullYear()+'</span></div><div class="row"><span class="row-label">Data source</span><span>Google Sheets</span></div><div class="row"><span class="row-label">Connected</span><span class="badge '+(connected()?'b-ok':'b-danger')+'">'+(connected()?'Yes':'No')+'</span></div></div>';
  h+='<div class="section">Note</div><div class="card"><div class="small-note">This version does not use a service worker, so it avoids browser cache issues. It still works well as a mobile web app through GitHub Pages.</div></div>';
  set(h);
}
function saveCfg(){S.settings.url=document.getElementById('cfg_url').value.trim();S.settings.token=document.getElementById('cfg_tok').value.trim();save();toast('Settings saved ✓');}

// ── ALERTS ────────────────────────────────────────────────────
function buildAlerts(mk){
  var a=[],tE=totControlledExp(mk),pE=totControlledBudget(mk);
  if(!connected())return[{t:'info',m:'Connect Google Sheets in Settings to see alerts.'}];
  if(tE>0&&tE>pE)a.push({t:'danger',m:'<strong>Regular expenses over budget by '+fmtFull(tE-pE)+'</strong> this month.'});
  controlledExpenseCats().forEach(function(c){var act=num(gExp(mk,c.key)),bud=num(gBudget(c.key,mk));if(bud>0&&act>bud*1.15)a.push({t:'warn',m:'<strong>'+c.label+'</strong> over budget by '+fmtFull(act-bud)+'.'});});
  if(num(gExp(mk,'incidental'))>0)a.push({t:'info',m:'<strong>Incidental expense recorded:</strong> '+fmtFull(gExp(mk,'incidental'))+'. This is included in netflow but excluded from daily spending rate.'});
  if(gInv(mk,'sr025')===null && num(gPlanInv('sr025',mk))>0)a.push({t:'warn',m:'<strong>SR025 planned but not recorded</strong> for '+labelFromMk(mk)+'.'});
  if(mk==='dec')a.push({t:'info',m:'<strong>Year-end reminder.</strong> In early January, archive this tracker, copy December closing balances into Start, then clear monthly actual columns.'});
  if(!a.length)a.push({t:'ok',m:'<strong>All clear.</strong> Update Google Sheets and sync to see latest.'});
  return a;
}
function aIcon(t){return t==='danger'?'🔴':t==='warn'?'🟡':t==='ok'?'🟢':'🔵';}

// ── API AND VALIDATION ────────────────────────────────────────
function api(action,payload){
  var url=S.settings.url;if(!url)return Promise.reject(new Error('No Apps Script URL. Open Settings first.'));
  var body=JSON.stringify(Object.assign({action:action,token:S.settings.token},payload||{}));
  return fetch(url,{method:'POST',body:body,headers:{'Content-Type':'text/plain;charset=utf-8'},cache:'no-store'})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status+'. Check Apps Script deployment.');return r.text();})
    .then(function(txt){try{return JSON.parse(txt);}catch(e){throw new Error('Backend did not return valid JSON. Check Apps Script permissions/deployment.');}})
    .then(function(j){if(!j.ok)throw new Error(j.error||'Unknown backend error');return j;});
}
function validateAll(r){
  var required=['plan','portfolio','income','expenses','invest'];
  required.forEach(function(k){if(!r[k]||typeof r[k]!=='object')throw new Error('Invalid response: missing '+k);});
  PF_INSTRUMENTS.forEach(function(i){if(!r.portfolio[i.key])console.warn('Portfolio key missing:',i.key);});
  return true;
}
function syncAll(){
  if(!S.settings.url){toast('⚠ Set Script URL in Settings');nav('settings');return;}
  var btn=document.getElementById('syncBtn');if(btn)btn.textContent='↻ Syncing…';
  api('getAll').then(function(r){
    validateAll(r);
    S.plan=r.plan||{};S.income=r.income||{};S.expenses=r.expenses||{};S.invest=r.invest||{};S.portfolio=r.portfolio||{};
    S.meta.lastSync=r.lastSync||new Date().toISOString();S.meta.lastError=null;
    save();toast('Synced ✓');if(btn)btn.textContent='↻ Sync';nav(S.page);
  }).catch(function(e){
    S.meta.lastError=e.message;save();toast('Error: '+e.message);if(btn)btn.textContent='↻ Sync';nav(S.page);
  });
}
function syncPf(){
  api('getPortfolio').then(function(r){
    if(!r.portfolio||typeof r.portfolio!=='object')throw new Error('Invalid portfolio response.');
    S.portfolio=r.portfolio;S.meta.lastSync=r.lastSync||new Date().toISOString();S.meta.lastError=null;save();toast('Portfolio loaded ✓');nav(S.page);
  }).catch(function(e){S.meta.lastError=e.message;save();toast('Error: '+e.message);});
}

// ── INIT ──────────────────────────────────────────────────────
load();
nav('dashboard');
if(S.settings.url)syncAll();
</script>
